// ══════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════
let currentDistrict = null;
let chipState = 'all';
let allViewOpen = false;
let districtSelected = false;   // 한 번이라도 구가 선택되면 true → empty 영역 완전 제거

// ══════════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════════
function init() {
  // Mark districts that have data
  document.querySelectorAll('.district-group').forEach(g => {
    const d = g.dataset.district;
    if (GALLERY_DATA[d]) g.classList.add('has-data');
    g.addEventListener('click', () => selectDistrict(d));
  });

  // Close btn
  document.getElementById('close-btn').addEventListener('click', closePanel);
  document.getElementById('reset-btn').addEventListener('click', closePanel);

  // Search / filter in detail panel
  document.getElementById('search-input').addEventListener('input', renderGalleries);
  document.getElementById('price-filter').addEventListener('change', renderGalleries);
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', function() {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      this.classList.add('on');
      chipState = this.dataset.chip;
      renderGalleries();
    });
  });

  // All view
  document.getElementById('all-view-btn').addEventListener('click', toggleAllView);
  document.getElementById('all-search').addEventListener('input', renderAllGalleries);
  document.getElementById('all-district-filter').addEventListener('change', renderAllGalleries);
  document.getElementById('all-price-filter').addEventListener('change', renderAllGalleries);

  // Populate district select for all view
  const sel = document.getElementById('all-district-filter');
  Object.keys(GALLERY_DATA).forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });

  // Total count
  let total = 0;
  Object.values(GALLERY_DATA).forEach(v => total += v.galleries.length);
  document.getElementById('total-count').textContent = total;
}

// ══════════════════════════════════════════════════════════════
//  Select District
// ══════════════════════════════════════════════════════════════
function selectDistrict(district) {
  if (!GALLERY_DATA[district]) return;

  // Update map selection
  document.querySelectorAll('.district-group').forEach(g => g.classList.remove('active'));
  const el = document.getElementById('d-' + district
    .replace('구','')
    .replace(/[가-힣]/g, c => ({
      '은평':'eunpyeong','도봉':'dobong','노원':'nowon','강북':'gangbuk',
      '성북':'seongbuk','종로':'jongno','동대문':'dongdaemun','중':'jung',
      '성동':'seongdong','서대문':'seodaemun','마포':'mapo','용산':'yongsan',
      '광진':'gwangjin','강서':'gangseo','양천':'yangcheon','영등포':'yeongdeungpo',
      '동작':'dongjak','관악':'gwanak','서초':'seocho','강남':'gangnam',
      '송파':'songpa','강동':'gangdong','중랑':'jungnang'
    }[c] || c))
  );
  // simpler lookup
  const idMap = {
    '은평구':'eunpyeong','도봉구':'dobong','노원구':'nowon','강북구':'gangbuk',
    '성북구':'seongbuk','종로구':'jongno','동대문구':'dongdaemun','중구':'jung',
    '성동구':'seongdong','서대문구':'seodaemun','마포구':'mapo','용산구':'yongsan',
    '광진구':'gwangjin','강서구':'gangseo','양천구':'yangcheon','영등포구':'yeongdeungpo',
    '동작구':'dongjak','관악구':'gwanak','서초구':'seocho','강남구':'gangnam',
    '송파구':'songpa','강동구':'gangdong','중랑구':'jungnang'
  };
  const gEl = document.getElementById('d-' + idMap[district]);
  if (gEl) gEl.classList.add('active');

  currentDistrict = district;

  // Close all view if open
  if (allViewOpen) toggleAllView();

  // 첫 선택 시 panel-empty를 display:none으로 완전히 제거 (공간까지 사라짐)
  if (!districtSelected) {
    districtSelected = true;
    document.getElementById('panel-empty').style.display = 'none';
  }

  // Show detail panel (flex로 나머지 공간 전부 차지)
  const detail = document.getElementById('panel-detail');
  detail.style.display = 'flex';
  document.getElementById('panel-header').classList.add('visible');
  document.getElementById('panel-search').classList.add('visible');

  // Set title & meta
  const data = GALLERY_DATA[district];
  document.getElementById('panel-title').textContent = district;
  document.getElementById('panel-meta').innerHTML =
    `<span class="meta-tag area">${data.sub}</span>` +
    `<span class="meta-tag count">${data.galleries.length}개 공간</span>`;

  // Reset filters
  document.getElementById('search-input').value = '';
  document.getElementById('price-filter').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.querySelector('.chip[data-chip="all"]').classList.add('on');
  chipState = 'all';

  renderGalleries();
}

// ══════════════════════════════════════════════════════════════
//  Render Gallery Cards (detail view)
// ══════════════════════════════════════════════════════════════
function renderGalleries() {
  if (!currentDistrict) return;
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const priceF = document.getElementById('price-filter').value;
  const data = GALLERY_DATA[currentDistrict];

  let list = data.galleries.filter(g => {
    if (q && !(g.name + g.addr).toLowerCase().includes(q)) return false;
    if (priceF && g.priceType !== priceF) return false;
    if (chipState === 'has-link' && !g.link) return false;
    if (chipState === 'cheap') {
      // only show ones with clearly cheap prices (under 100k)
      if (g.priceType !== 'paid') return false;
      const num = parseInt(g.price.replace(/[^0-9]/g,''));
      if (num > 100) return false;
    }
    return true;
  });

  const countLabel = document.getElementById('gallery-count-label');
  countLabel.textContent = `${list.length} / ${data.galleries.length}개 표시 중`;

  const container = document.getElementById('gallery-list');
  const noRes = document.querySelector('.no-results');

  if (list.length === 0) {
    container.innerHTML = '';
    if (!noRes) {
      const d = document.createElement('div');
      d.className = 'no-results visible';
      d.textContent = '검색 결과가 없습니다.';
      container.appendChild(d);
    } else noRes.classList.add('visible');
    return;
  }
  if (noRes) noRes.classList.remove('visible');

  container.innerHTML = list.map((g, i) => `
    <div class="gallery-card" style="animation-delay:${i * 0.04}s">
      <div class="card-name">${g.name}</div>
      <div class="card-addr">${g.addr}</div>
      <div class="card-bottom">
        <span class="price-badge ${g.priceType}">${formatPriceLabel(g.priceType, g.price)}</span>
        ${g.note ? `<span class="card-note">${g.note}</span>` : ''}
      </div>
      ${g.link ? `
      <div class="card-link">
        <a href="${g.link}" target="_blank" rel="noopener">${extractDomain(g.link)}</a>
      </div>` : ''}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════════
//  All View
// ══════════════════════════════════════════════════════════════
function toggleAllView() {
  allViewOpen = !allViewOpen;
  const btn = document.getElementById('all-view-btn');
  const allPanel = document.getElementById('panel-all');
  const detail = document.getElementById('panel-detail');
  const empty = document.getElementById('panel-empty');

  if (allViewOpen) {
    btn.classList.add('active');
    allPanel.classList.add('visible');
    detail.style.display = 'none';
    // districtSelected 여부에 관계없이 all view 열릴 때 empty는 항상 숨김
    empty.style.display = 'none';
    renderAllGalleries();
  } else {
    btn.classList.remove('active');
    allPanel.classList.remove('visible');
    if (currentDistrict) {
      // 선택된 구가 있으면 detail 복원
      detail.style.display = 'flex';
    } else if (!districtSelected) {
      // 한 번도 선택 안 했으면 empty 복원
      empty.style.display = '';
    }
    // districtSelected가 true이고 currentDistrict가 null이면 둘 다 숨긴 채 유지
  }
}

function renderAllGalleries() {
  const q = document.getElementById('all-search').value.trim().toLowerCase();
  const distF = document.getElementById('all-district-filter').value;
  const priceF = document.getElementById('all-price-filter').value;

  let groups = [];
  Object.entries(GALLERY_DATA).forEach(([dist, data]) => {
    if (distF && dist !== distF) return;
    const rows = data.galleries.filter(g => {
      if (q && !(g.name + g.addr + dist).toLowerCase().includes(q)) return false;
      if (priceF && g.priceType !== priceF) return false;
      return true;
    });
    if (rows.length) groups.push({ dist, sub: data.sub, rows });
  });

  let total = 0;
  groups.forEach(g => total += g.rows.length);

  const container = document.getElementById('all-list');
  if (!groups.length) {
    container.innerHTML = '<div style="padding:40px;text-align:center;font-size:12px;color:var(--text-3);">검색 결과가 없습니다.</div>';
    return;
  }

  container.innerHTML = groups.map(g => `
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);">
        <span style="font-family:var(--font-display);font-size:18px;color:var(--text-1);">${g.dist}</span>
        <span style="font-size:11px;color:var(--text-3);">${g.sub}</span>
        <span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-3);">${g.rows.length}개</span>
      </div>
      ${g.rows.map((r, i) => `
        <div class="gallery-card" style="animation-delay:${i*0.03}s">
          <div class="card-name">${r.name}</div>
          <div class="card-addr">${r.addr}</div>
          <div class="card-bottom">
            <span class="price-badge ${r.priceType}">${formatPriceLabel(r.priceType, r.price)}</span>
            ${r.note ? `<span class="card-note">${r.note}</span>` : ''}
          </div>
          ${r.link ? `<div class="card-link"><a href="${r.link}" target="_blank" rel="noopener">${extractDomain(r.link)}</a></div>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════════
function closePanel() {
  document.querySelectorAll('.district-group').forEach(g => g.classList.remove('active'));
  currentDistrict = null;

  // districtSelected가 true이면 panel-empty는 이미 display:none 상태 유지
  // 선택 해제 시에는 empty를 다시 보여주지 않고, detail만 숨김
  if (!districtSelected) {
    // 아직 한 번도 선택 안 한 상태라면 empty 그대로 표시
    document.getElementById('panel-empty').style.display = '';
  }
  document.getElementById('panel-detail').style.display = 'none';
  document.getElementById('panel-header').classList.remove('visible');
  document.getElementById('panel-search').classList.remove('visible');
  if (allViewOpen) {
    allViewOpen = false;
    document.getElementById('panel-all').classList.remove('visible');
    document.getElementById('all-view-btn').classList.remove('active');
  }
}

function formatPriceLabel(type, price) {
  if (type === 'free') return '무료';
  if (type === 'paid') return price;
  return '문의 필요';
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); }
  catch { return url.slice(0,30); }
}

// ══════════════════════════════════════════════════════════════
init();
</script>
