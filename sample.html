<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>4ulog</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #080808;
                height: 350vh;
            }

            .sticky-container {
                position: sticky;
                top: 0;
                width: 100%;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .taxi-wrapper {
                position: relative;
                display: inline-block;
                max-height: 100vh;
            }

            .taxi-img {
                display: block;
                max-width: 100vw;
                max-height: 100vh;
                object-fit: contain;
            }

            /* 후미등 오버레이 */
            .light {
                position: absolute;
                pointer-events: none;
                opacity: 0;
                border-radius: 4px;
                mix-blend-mode: screen;
                filter: blur(12px);
            }

            /* 왼쪽 후미등 하단 (메인) */
            .light-main {
                left: 59%;
                top: 52%;
                width: 4%;
                height: 3%;
                background: rgba(255, 185, 15, 0.92);
                box-shadow:
                    0 0 6px 3px rgba(255, 170, 0, 0.7),
                    0 0 16px 7px rgba(255, 130, 0, 0.3);
            }

            /* 왼쪽 후미등 상단 */
            .light-upper {
                left: 59%;
                top: 45%;
                width: 8%;
                height: 7%;
                background: rgba(255, 200, 25, 0.88);
                box-shadow:
                    0 0 5px 2px rgba(255, 180, 0, 0.65),
                    0 0 13px 5px rgba(255, 140, 0, 0.25);
            }

            /* 오른쪽 후미등 */
            .light-right {
                left: 82%;
                top: 46%;
                width: 4%;
                height: 8%;
                background: rgba(255, 185, 15, 0.9);
                box-shadow:
                    0 0 5px 2px rgba(255, 170, 0, 0.65),
                    0 0 13px 5px rgba(255, 130, 0, 0.25);
            }

            /* 지면 반사 */
            .light-reflect {
                left: 60%;
                top: 80%;
                width: 8%;
                height: 4%;
                background: radial-gradient(
                    ellipse at center,
                    rgba(255, 180, 0, 0.2) 0%,
                    transparent 70%
                );
                filter: blur(6px);
                border-radius: 50%;
                mix-blend-mode: screen;
            }

            .light-right-reflect {
                left: 90%;
                top: 80%;
                width: 8%;
                height: 4%;
                background: radial-gradient(
                    ellipse at center,
                    rgba(255, 180, 0, 0.2) 0%,
                    transparent 70%
                );
                filter: blur(6px);
                border-radius: 50%;
                mix-blend-mode: screen;
            }

            @keyframes flicker {
                0% {
                    opacity: 1;
                }
                4% {
                    opacity: 0.7;
                }
                8% {
                    opacity: 1;
                }
                14% {
                    opacity: 0.15;
                }
                18% {
                    opacity: 0.95;
                }
                22% {
                    opacity: 0.4;
                }
                26% {
                    opacity: 1;
                }
                34% {
                    opacity: 0.85;
                }
                40% {
                    opacity: 0.05;
                }
                44% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.75;
                }
                56% {
                    opacity: 1;
                }
                62% {
                    opacity: 0.2;
                }
                68% {
                    opacity: 0.9;
                }
                72% {
                    opacity: 0.1;
                }
                76% {
                    opacity: 1;
                }
                84% {
                    opacity: 0.6;
                }
                90% {
                    opacity: 1;
                }
                96% {
                    opacity: 0.3;
                }
                100% {
                    opacity: 1;
                }
            }

            @keyframes flicker-reflect {
                0% {
                    opacity: 0.5;
                }
                14% {
                    opacity: 0.1;
                }
                26% {
                    opacity: 0.5;
                }
                40% {
                    opacity: 0.05;
                }
                56% {
                    opacity: 0.45;
                }
                72% {
                    opacity: 0.05;
                }
                84% {
                    opacity: 0.4;
                }
                100% {
                    opacity: 0.5;
                }
            }

            .light.active {
                animation: flicker 0.9s ease-in-out infinite;
            }

            .light-reflect.active {
                animation: flicker-reflect 0.9s ease-in-out infinite;
            }

            .light-right-reflect.active {
                animation: flicker-reflect 0.9s ease-in-out infinite;
            }

            /* 스크롤 힌트 */
            .scroll-hint {
                position: fixed;
                bottom: 36px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                color: rgba(255, 255, 255, 0.45);
                font-family: "Helvetica Neue", sans-serif;
                font-size: 11px;
                letter-spacing: 3px;
                text-transform: uppercase;
                transition: opacity 0.6s ease;
            }

            .scroll-hint .arrow {
                width: 1px;
                height: 40px;
                background: linear-gradient(
                    to bottom,
                    transparent,
                    rgba(255, 255, 255, 0.4)
                );
                animation: arrow-drop 1.4s ease-in-out infinite;
            }

            @keyframes arrow-drop {
                0%,
                100% {
                    opacity: 0.2;
                    transform: scaleY(0.6) translateY(-6px);
                }
                50% {
                    opacity: 0.8;
                    transform: scaleY(1) translateY(0);
                }
            }

            .scroll-hint.hidden {
                opacity: 0;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="sticky-container">
            <div class="taxi-wrapper" id="taxiWrapper">
                <img
                    class="taxi-img"
                    src="image/DSCF4664.JPG"
                    alt="Taxi"
                    id="taxiImg"
                />
                <div class="light light-upper" id="lightUpper"></div>
                <div class="light light-main" id="lightMain"></div>
                <!-- <div class="light light-right" id="lightRight"></div> -->
                <div class="light light-reflect" id="lightReflect"></div>
                <!-- <div class="light light-right-reflect" id="lightReflect"></div> -->
            </div>
        </div>

        <div class="scroll-hint" id="scrollHint">
            <span>scroll</span>
            <div class="arrow"></div>
        </div>

        <script>
            const lightMain = document.getElementById("lightMain");
            const lightUpper = document.getElementById("lightUpper");
            const lightRight = document.getElementById("lightRight");
            const lightReflect = document.getElementById("lightReflect");
            const scrollHint = document.getElementById("scrollHint");

            const THRESHOLD = 80;

            let lastY = 0;
            let ticking = false;

            function update(scrollY) {
                if (scrollY > THRESHOLD) {
                    lightMain.classList.add("active");
                    lightUpper.classList.add("active");
                    lightRight.classList.add("active");
                    lightReflect.classList.add("active");
                    scrollHint.classList.add("hidden");
                } else {
                    lightMain.classList.remove("active");
                    lightUpper.classList.remove("active");
                    lightRight.classList.remove("active");
                    lightReflect.classList.remove("active");
                    scrollHint.classList.remove("hidden");
                }
            }

            window.addEventListener("scroll", () => {
                lastY = window.scrollY;
                if (!ticking) {
                    requestAnimationFrame(() => {
                        update(lastY);
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        </script>
    </body>
</html>
